<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="loginpage.css">
</head>
<body>
    <div class="container">
        <div class="leftdiv">
            <img src="leftdiv.jpeg" alt="companylogo">
        </div>

        <div class="rightdiv">
            

           <div class="form">

            <h1>Hello Again !</h1>
            <p>Welcome back ! We missed you !</p>

             <form action="">
                <label for="email">Email</label><br>
                <input type="email" name="email" id="email" placeholder="Emailid@site.com">
                <br><br>

                <label for="password">Password</label><br>
                <input type="password" name="password" id="password" placeholder="Enter your password">
                 <br>
                <a href="#" class="forgot">Forgot Password</a>
                <br><br>

                
                <button>Login</button>

            </form>
            <p class="end">Not a member? <span class="Register"><a href="#" >Register now</a></span> </p>
           </div>

        </div>
    </div>
</body>
</html>
